<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <header>
    <div class="title-row">
      <h1>Tab Time</h1>
      <div class="day-nav">
        <button id="prevDay" title="Previous day">‹</button>
        <span id="dayLabel">Today</span>
        <button id="nextDay" title="Next day">›</button>
      </div>
    </div>
    <div class="total" id="total">0m</div>
    <div class="subtitle">total browsing time</div>
  </header>

  <main>
    <ul id="list" class="site-list"></ul>
    <p id="empty" class="empty" hidden>No browsing tracked for this day yet.</p>
  </main>

  <footer>
    <button id="clearBtn" class="ghost">Clear this day</button>
    <a class="link" id="manageLink" href="options.html" target="_blank">Manage limits →</a>
  </footer>
</body>
<script src="popup.js"></script>
</html>
